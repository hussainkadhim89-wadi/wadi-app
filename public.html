<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      font-family: 'IBM Plex Sans Arabic', Arial, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
    }
    @media print {
      .pub-bar, .pub-notice, .pub-dl-btn { display: none !important; }

    .pub-bar{
  background:#fff;
  border-bottom:1px solid #e2e8f0;
  padding:12px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.pub-bar-left{display:flex;align-items:center;gap:10px;}
.pub-bar-left .pub-logo{font-size:22px;}
.pub-bar-left .pub-co{font-size:15px;font-weight:800;color:#8B1A1A;}
.pub-bar-left .pub-id{font-size:11px;color:#64748b;background:#f1f5f9;padding:2px 8px;border-radius:4px;font-family:monospace;}
.pub-dl-btn{
  background:#8B1A1A;color:#fff;border:none;
  padding:9px 18px;border-radius:6px;font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  -webkit-tap-highlight-color:transparent;
}
.pub-dl-btn:active{background:#6d1515;}
.pub-content{max-width:860px;margin:20px auto;padding:0 16px 48px;}
.pub-notice{
  background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;
  padding:10px 14px;font-size:12px;color:#92400e;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
  .pub-content{padding:0 6px 40px;}
  .pub-bar,.pub-notice,.pub-dl-btn{display:none!important;}
  .pub-content{max-width:100%;margin:0;padding:0;}
    /* Print A4 */
    #iprint {
      width: 794px;
      background: #fff;
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: #1a1a1a;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      margin: 0 auto;
    }
    @media (max-width: 860px) {
      #iprint { width: 100% !important; font-size: 10px; }
    }
  </style>
</head>

<script>
// ── Supabase ──
const { createClient } = supabase;
const sb = createClient(
  'https://lakokpqtksrpiillbuzb.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxha29rcHF0a3NycGlpbGxidXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODUyMzEsImV4cCI6MjA5MTI2MTIzMX0.rl_8rUJwDJwP2LDDIO2KbWzSIYF4KUsjEH8PLBcmHhU'
);

// ── APP_SETTINGS defaults ──
const APP_SETTINGS = {
  companyNameAr:  'شركة وادي الطاقة للتجارة العامة',
  companyNameEn:  'Wadi Al-Taqaa For General Trade Company',
  companyAddress: 'Al Majal Business Park – Zubair Street, Near Well 20, Basra, Iraq',
  companyIBAN:    'IQ37BABI716007234428054',
  companySWIFT:   'BABIIQBA',
  companyBank:    'BANK OF BAGHDAD',
};

// ── Helpers ──
const RED = '#8b1a1a';
function fmtN(n) {
  return (+n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtD(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('en-GB'); } catch (_) { return d; }
}
function sanitizeText(v) { return (v || '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function sanitizeAmount(v) { return isNaN(+v) ? 0 : +v; }
function esc(v) {
  return String(v == null ? '' : v)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ════════════════════════════════════════
// 🌐 PUBLIC INVOICE VIEW — v48.6
// ─ GitHub Pages only
// ─ Isolated: no login, no localStorage,
//   no app init, no internal listeners
// ─ Fetches ONLY: invoices + invoice_lines
// ════════════════════════════════════════
(function _publicViewInit(){
  // قراءة الـ param من URL
  // ── 1) Safe Parsing — sanitize + normalize ──
  const _p = new URLSearchParams(window.location.search);
  let _rawId = _p.get('public') || '';
  // decode أولاً — لو ID مشفر (%22 وغيره)
  try{ _rawId = decodeURIComponent(_rawId); }catch(_){}
  // Safari fixes:
  _rawId = _rawId.trim();                        // حذف مسافات
  _rawId = _rawId.replace(/^"+|"+$/g, '');      // حذف quotes لو Safari أضافها
  _rawId = _rawId.replace(/^'+|'+$/g, '');      // حذف single quotes
  // sanitize: حروف + أرقام + hyphen + underscore، max 60
  // normalize: uppercase لتجنب mismatch (WT-182 = wt-182)
  const _invId = _rawId.replace(/[^a-zA-Z0-9\-_]/g, '').slice(0, 60).toUpperCase();
  if(!_invId){ return; } // مو public link — تابع الـ app العادي

  // ── إعداد الـ UI ──
  document.getElementById('public-view').classList.add('active');
  const _ls = document.getElementById('login-screen');
  if(_ls) _ls.style.display = 'none';
  // textContent آمن — لا XSS
  document.getElementById('pub-inv-badge').textContent = _invId;

  // ── Flag: يمنع initAuth من التشغيل ──
  window._PUBLIC_MODE = true;

  // ── Loading State ──
  function _showLoading(area){
    area.innerHTML =
      '<div style="text-align:center;padding:64px 20px;color:#64748b">'
      +'<div style="font-size:36px;margin-bottom:10px;animation:spin .9s linear infinite;display:inline-block">⏳</div>'
      +'<div style="font-size:14px;margin-top:8px;font-weight:500">Loading invoice…</div>'
      +'<div style="font-size:12px;margin-top:4px;color:#94a3b8">'+_invId+'</div>'
      +'</div>';
  }

  // ── Error State — مع retry + disable أثناء التحميل ──
  function _showError(area, msg, retryable){
    area.innerHTML =
      '<div style="text-align:center;padding:64px 20px">'
      +'<div style="font-size:36px;margin-bottom:12px">'+(retryable?'⚠️':'❌')+'</div>'
      +'<div style="font-size:15px;font-weight:600;color:#1e293b;margin-bottom:6px">'+msg.title+'</div>'
      +'<div style="font-size:12px;color:#94a3b8;margin-bottom:'+(retryable?'20px':'0px')+'">'+msg.detail+'</div>'
      +(retryable
        ?'<button id="_pub-retry-btn" onclick="_fetchInvoice()" '
          +'style="background:#8B1A1A;color:#fff;border:none;padding:9px 22px;'
          +'border-radius:6px;font-size:13px;font-weight:700;cursor:pointer">'
          +'↺ Try Again</button>'
        :'')
      +'</div>';
  }

  // ── Fetch — timeout 12s + retry disable + race safety ──
  // ── Fetch state ──
  let _reqId   = 0;    // race safety: ID فريد لكل request
  let _curCtrl = null; // الـ AbortController للـ request الحالي

  async function _fetchInvoice(){
    // ── 1) Abort request السابق لو شغال ──
    if(_curCtrl){ _curCtrl.abort(); _curCtrl = null; }

    // ── 2) Reset state كامل قبل البدء ──
    const area = document.getElementById('pub-area');
    window._pubPDFName = null; // reset اسم الـ PDF

    // disable retry button لو موجود
    const _retryBtn = document.getElementById('_pub-retry-btn');
    if(_retryBtn){
      _retryBtn.disabled = true;
      _retryBtn.textContent = 'Loading…';
      _retryBtn.style.opacity = '0.6';
      _retryBtn.style.cursor = 'not-allowed';
    }

    _showLoading(area);

    // race ID + AbortController جديد
    const _thisReq = ++_reqId;
    const _ctrl = new AbortController();
    _curCtrl = _ctrl;
    let _timer = setTimeout(() => _ctrl.abort(), 12000);

    try{
      const [r1, r2] = await Promise.all([
        sb.from('invoices').select('*').eq('id', _invId).abortSignal(_ctrl.signal).single(),
        sb.from('invoice_lines').select('*').eq('invoice_id', _invId).abortSignal(_ctrl.signal).order('id'),
      ]);

      // تجاهل response من request قديم
      if(_thisReq !== _reqId) return;

      // ── 3) Defensive check: inv موجود وصالح ──
      const inv = (r1 && !r1.error && r1.data && typeof r1.data === 'object')
        ? r1.data : null;

      if(!inv){
        _showError(area, {
          title: 'Invoice not found',
          detail: '"' + _invId + '" does not exist or is not publicly accessible.'
        }, false);
        return;
      }

      // حالة بدون lines: دايماً array
      const lines = Array.isArray(r2 && r2.data) ? r2.data : [];

      // تحديث bar
      const coName = (typeof APP_SETTINGS !== 'undefined' && APP_SETTINGS.companyNameEn)
        ? APP_SETTINGS.companyNameEn
        : 'Wadi Al-Taqaa For General Trade';
      document.getElementById('pub-co-name').textContent = coName;
      document.title = _invId + ' — ' + coName;

      // اسم ملف PDF
      const _dateStr = inv.date
        ? new Date(inv.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}).replace(/ /g,'')
        : '';
      const _custShort = (inv.customer_name || '').replace(/\s+/g,'').slice(0,12);
      window._pubPDFName = _invId.replace(/[^a-zA-Z0-9]/g,'_') + '_' + _custShort + '_' + _dateStr;

      area.innerHTML = _buildA4(inv, lines, _invId);

      // ════════════════════════════════════════
      // 📊 INVOICE TRACKING — Phase 1
      // async بعد render — silent fail — لا يؤخر التحميل
      // ════════════════════════════════════════
      // TRACKING — يسجل عند كل فتح/refresh
      // non-blocking: setTimeout(0)
      setTimeout(async function _trackView(){
        try{
          const _tid = (_invId||'').replace(/[^a-zA-Z0-9\-_]/g,'').slice(0,60);
          if(!_tid) return;
          if(!sb || typeof sb.from !== 'function') return;
          await sb.from('invoice_views').insert({
            invoice_id: _tid,
            viewed_at:  new Date().toISOString(),
          });
        }catch(_){}
      }, 1000);

    }catch(err){
      // تجاهل من request قديم
      if(_thisReq !== _reqId) return;
      // cross-browser: name أو message
      const _msg = (err?.message||'').toLowerCase();
      const _isAbort = err?.name === 'AbortError'
        || (err instanceof DOMException && _msg.includes('abort'))
        || (err instanceof TypeError    && _msg.includes('abort'));
      const isTimeout = _isAbort;
      _showError(area, {
        title: isTimeout ? 'Request timed out' : 'Connection error',
        detail: isTimeout
          ? 'The server took too long to respond. Try again.'
          : 'Could not load the invoice. Check your connection and try again.'
      }, true);
      // abort طبيعي — لا نسجله (name أو message)
      if(!_isAbort && err){
        console.error('[Public View]', {
          name:    err?.name,
          message: err?.message,
        });
      }
    } finally {
      // clearTimeout دايماً — نجح أو فشل أو abort
      clearTimeout(_timer);
      // reset _curCtrl لو هذا الـ request هو الأخير
      if(_thisReq === _reqId) _curCtrl = null;
    }
  }
  // expose للـ retry button
  window._fetchInvoice = _fetchInvoice;

  // ── بناء A4 ─ مستقل تماماً ──
  function _buildA4(inv, lines, id){
    const S = (typeof APP_SETTINGS !== 'undefined') ? APP_SETTINGS : {};
    const co    = esc(S.companyNameEn  || 'Wadi Al-Taqaa For General Trade');
    const addr  = esc(S.companyAddress || 'Apt 2, Plot 118, Al-Tuwaisa, Basra, Iraq');
    const iban  = esc(S.companyIBAN    || 'IQ37BABI716007234428054');
    const swift = esc(S.companySWIFT   || 'BABIIQBA');
    const ph1   = esc(S.phoneHussain  || '+964 780 147 2330');
    const ph2   = esc(S.phoneNwar     || '+964 771 672 0051');
    const em1   = esc(S.emailHussain  || 'wadilataqaa2016@gmail.com');
    const em2   = esc(S.emailNwar     || 'nwaroil81@gmail.com');

    // حالة بدون lines: detailed بس ما فيه lines → يرجع لـ simple mode
    const _hasLines = Array.isArray(lines) && lines.length > 0;
    const isDetailed = inv.invoice_type === 'detailed' && _hasLines;
    const subtotal   = isDetailed
      ? lines.reduce((s,l) => s + (+l.qty||0) * (+l.unit_price||0), 0)
      : (+inv.sale_amount || 0);

    const fmtD = d => { try{ const [y,m,dd]=(d||'').split('-'); return dd+'/'+m+'/'+y; }catch{ return d||'—'; } };
    const fmtN = n => n.toLocaleString('en-US',{minimumFractionDigits:2});

    const lpoNum  = esc(inv.lpo_number||'—'); const orderNo = esc(inv.order_number||'—');
    const bcRef   = esc(inv.bc_reference||'—'); const intRef  = esc(inv.internal_ref||'—');
    const reqBy   = esc(inv.requested_by||'—'); const lpoDate = inv.lpo_date?esc(fmtD(inv.lpo_date)):'—';
    const credit  = esc(inv.credit_terms||'60 Days');
    const reqDel  = inv.required_delivery?esc(fmtD(inv.required_delivery)):'—';
    const crBy    = esc(inv.created_by||'—'); const delTo   = esc(inv.delivery_to||'—');
    const site    = esc(inv.project_site||inv.reference||'—');
    const cAddr   = esc(inv.customer_address||'Al Majal Business Park – Zubair Street, Near Well 20, Basra, Iraq');

    const rowsHTML = isDetailed
      ? lines.map((l,i)=>{
          const amt=(+l.qty||0)*(+l.unit_price||0);
          return '<tr>'
            +'<td style="padding:6px 7px;text-align:center;border:1px solid #ddd">'+(i+1)+'</td>'
            +'<td style="padding:6px 7px;text-align:center;border:1px solid #ddd;font-family:monospace;font-size:9.5px">'+esc(l.item_code||'—')+'</td>'
            +'<td style="padding:6px 7px;text-align:left;border:1px solid #ddd;font-weight:500">'+esc(l.description||'—')+'</td>'
            +'<td style="padding:6px 7px;text-align:center;border:1px solid #ddd;color:#666">'+esc(l.origin||'NA')+'</td>'
            +'<td style="padding:6px 7px;text-align:center;border:1px solid #ddd;color:#666">'+esc(l.brand||'NA')+'</td>'
            +'<td style="padding:6px 7px;text-align:center;border:1px solid #ddd">'+esc(l.uom||'EA')+'</td>'
            +'<td style="padding:6px 7px;text-align:center;border:1px solid #ddd;font-family:monospace">'+(l.qty||0)+'</td>'
            +'<td style="padding:6px 7px;text-align:right;border:1px solid #ddd;font-family:monospace">'+fmtN(+l.unit_price||0)+'</td>'
            +'<td style="padding:6px 7px;text-align:right;border:1px solid #ddd;font-family:monospace;font-weight:700">'+fmtN(amt)+'</td>'
            +'</tr>';
        }).join('')
      : '<tr>'
        +'<td style="padding:6px 7px;text-align:center;border:1px solid #ddd">1</td>'
        +'<td style="padding:6px 7px;text-align:center;border:1px solid #ddd;font-family:monospace;font-size:9.5px">—</td>'
        +'<td style="padding:6px 7px;text-align:left;border:1px solid #ddd;font-weight:500">'+esc(inv.description||'—')+'</td>'
        +'<td style="padding:6px 7px;text-align:center;border:1px solid #ddd">NA</td>'
        +'<td style="padding:6px 7px;text-align:center;border:1px solid #ddd">NA</td>'
        +'<td style="padding:6px 7px;text-align:center;border:1px solid #ddd">EA</td>'
        +'<td style="padding:6px 7px;text-align:center;border:1px solid #ddd;font-family:monospace">1</td>'
        +'<td style="padding:6px 7px;text-align:right;border:1px solid #ddd;font-family:monospace">'+fmtN(subtotal)+'</td>'
        +'<td style="padding:6px 7px;text-align:right;border:1px solid #ddd;font-family:monospace;font-weight:700">'+fmtN(subtotal)+'</td>'
        +'</tr>';

    const amtWords = (typeof numToWordsIQD !== 'undefined')
      ? numToWordsIQD(subtotal)
      : fmtN(subtotal) + ' Iraqi Dinars Only';

    const logo = (typeof _WADI_LOGO !== 'undefined' && _WADI_LOGO)
      ? '<img src="'+_WADI_LOGO+'" style="height:48px" alt="Wadi Al-Taqaa">'
      : '<div style="font-size:16px;font-weight:800;color:#8B1A1A">⚡ WADI AL-TAQAA</div>';

    const infoRow = (l,v) =>
      '<div style="display:grid;grid-template-columns:120px 1fr;border-bottom:1px solid #eee">'
      +'<div style="background:#f5f5f5;padding:5px 8px;font-weight:700;font-size:9px;color:#555;text-transform:uppercase;border-right:1px solid #eee;letter-spacing:.2px">'+l+'</div>'
      +'<div style="padding:5px 8px;font-size:10px">'+v+'</div></div>';

    const infoRowR = (l,v) =>
      '<div style="display:grid;grid-template-columns:90px 1fr;border-bottom:1px solid #eee">'
      +'<div style="background:#f5f5f5;padding:5px 8px;font-weight:700;font-size:9px;color:#555;text-transform:uppercase;border-right:1px solid #eee">'+l+'</div>'
      +'<div style="padding:5px 8px;font-size:10px;font-weight:700">'+v+'</div></div>';

    const poRow = (l,v,last) =>
      '<div style="display:grid;grid-template-columns:120px 1fr;border-bottom:'+(last?'none':'1px solid #eee')+'">'
      +'<div style="background:#f5f5f5;padding:5px 8px;font-weight:700;font-size:9px;color:#555;text-transform:uppercase;border-right:1px solid #eee;letter-spacing:.2px">'+l+'</div>'
      +'<div style="padding:5px 8px;font-size:10px">'+v+'</div></div>';

    const RED = '#8B1A1A';
    const secBar = t =>
      '<div style="background:'+RED+';color:#fff;font-weight:700;font-size:9.5px;letter-spacing:1px;padding:5px 28px;text-transform:uppercase">'+t+'</div>';

    return (
      '<div id="iprint" dir="ltr" style="width:794px;background:#fff;font-family:Arial,sans-serif;font-size:11px;color:#1a1a1a;box-shadow:0 4px 20px rgba(0,0,0,.12);margin:0 auto">'
      // Header
      +'<div style="display:flex;align-items:center;justify-content:space-between;padding:20px 28px 14px">'
      +logo
      +'<div style="font-size:22px;font-weight:900;letter-spacing:3px;color:#1a1a1a">INVOICE</div>'
      +'</div>'
      // Info Grid
      +'<div style="display:grid;grid-template-columns:1fr 1fr;border:1px solid #ccc;margin:0 28px 12px;border-radius:2px">'
        +'<div style="border-right:1px solid #ccc">'
          +infoRow('INVOICE NO.','<b>'+id+'</b>')
          +infoRow('INVOICE DATE', inv.date?esc(inv.date.split('-').reverse().join('/')):'—')
          +infoRow('PROJECT / SITE', site)
          +infoRow('REFERENCE', esc(inv.reference||id.split('-').slice(-1)[0]||'—'))
        +'</div>'
        +'<div>'
          +infoRowR('BILL TO', esc(inv.customer_name||'—'))
          +'<div style="display:grid;grid-template-columns:90px 1fr;border-bottom:1px solid #eee">'
            +'<div style="background:#f5f5f5;padding:5px 8px;font-weight:700;font-size:9px;color:#555;text-transform:uppercase;border-right:1px solid #eee">ADDRESS</div>'
            +'<div style="padding:5px 8px;font-size:10px;line-height:1.4">'+cAddr+'</div>'
          +'</div>'
          +'<div style="display:grid;grid-template-columns:90px 1fr;border-bottom:1px solid #eee"><div style="background:#f5f5f5;padding:5px 8px;border-right:1px solid #eee"></div><div style="padding:5px 8px"></div></div>'
          +'<div style="display:grid;grid-template-columns:90px 1fr"><div style="background:#f5f5f5;padding:5px 8px;border-right:1px solid #eee"></div><div style="padding:5px 8px"></div></div>'
        +'</div>'
      +'</div>'
      // PO
      +secBar('Purchase Order References')
      +'<div style="display:grid;grid-template-columns:1fr 1fr;border:1px solid #ccc;border-top:none;margin:0 28px 12px">'
        +'<div style="border-right:1px solid #ccc">'
          +poRow('LPO Number',lpoNum,false)+poRow('Order No.',orderNo,false)
          +poRow('BC Reference',bcRef,false)+poRow('Internal Ref.',intRef,false)
          +poRow('Requested By',reqBy,true)
        +'</div>'
        +'<div>'
          +poRow('LPO Sent Date',lpoDate,false)+poRow('Credit Terms',credit,false)
          +poRow('Required Delivery',reqDel,false)+poRow('Created By',crBy,false)
          +poRow('Delivery To',delTo,true)
        +'</div>'
      +'</div>'
